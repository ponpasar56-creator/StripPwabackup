<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Aplikasi manajemen stok stiker motor - Folder bersarang & PWA">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <title>Stok Strip Pro - Folder Bersarang</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f1f5f9; padding-bottom: 70px; }
        
        .header { background: #0f172a; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header h2 { font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .sync-status { background: #10b981; border-radius: 30px; padding: 5px 12px; font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
        .sync-status.offline { background: #ef4444; }
        .menu-btn { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 1.3rem; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
        
        .menu-dropdown { position: absolute; top: 60px; right: 15px; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 250px; z-index: 200; display: none; overflow: hidden; }
        .menu-dropdown.show { display: block; }
        .menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; }
        .menu-item:active { background: #f1f5f9; }
        .menu-item.danger { color: #dc2626; }
        
        /* Breadcrumb Navigation */
        .breadcrumb { background: white; padding: 12px 15px; border-bottom: 1px solid #e2e8f0; display: flex; flex-wrap: wrap; align-items: center; gap: 5px; font-size: 0.85rem; overflow-x: auto; }
        .breadcrumb-item { color: #2563eb; cursor: pointer; }
        .breadcrumb-item:active { opacity: 0.7; }
        .breadcrumb-sep { color: #94a3b8; }
        .breadcrumb-current { font-weight: bold; color: #1e293b; }
        
        .search-wrapper { padding: 12px 15px 0 15px; background: #f1f5f9; position: sticky; top: 108px; z-index: 50; }
        .search-box { width: 100%; padding: 12px 16px; border-radius: 30px; border: 1px solid #e2e8f0; background: white; font-size: 0.9rem; margin-bottom: 12px; }
        .folders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; padding: 0 15px 15px 15px; }
        .folder-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; transition: transform 0.1s; position: relative; }
        .folder-card:active { transform: scale(0.98); }
        .folder-cover { height: 110px; background-size: cover; background-position: center; background-color: #e2e8f0; position: relative; display: flex; align-items: flex-end; justify-content: flex-end; padding: 6px; }
        .folder-badge { background: rgba(0,0,0,0.6); color: white; border-radius: 20px; padding: 2px 8px; font-size: 0.7rem; font-weight: bold; }
        .folder-info { padding: 10px; }
        .folder-name { font-weight: bold; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }
        .folder-name span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .folder-count { font-size: 0.7rem; color: #64748b; margin-top: 4px; }
        .folder-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
        .folder-action-btn { background: none; border: none; font-size: 0.7rem; padding: 4px 8px; border-radius: 20px; cursor: pointer; color: #64748b; }
        .folder-action-btn.edit { color: #2563eb; }
        .folder-action-btn.delete { color: #dc2626; }
        .folder-action-btn.subfolder { color: #10b981; }
        .add-folder-btn-fixed { background: #2563eb; color: white; border: none; border-radius: 30px; padding: 10px 16px; font-weight: bold; margin: 0 15px 15px auto; display: block; cursor: pointer; width: fit-content; }
        .back-button { background: #64748b; margin: 0 15px 10px auto; padding: 8px 16px; font-size: 0.8rem; width: auto; display: inline-block; }
        
        .main-content { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-label { font-weight: bold; font-size: 0.75rem; color: #475569; margin-bottom: 5px; display: block; margin-top: 10px; }
        .form-label:first-of-type { margin-top: 0; }
        .form-input { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #e2e8f0; margin-bottom: 15px; font-size: 0.9rem; }
        .form-input:focus { outline: none; border-color: #2563eb; }
        .btn-primary { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-cancel { background: #64748b; }
        .btn-success { background: #10b981; }
        
        .image-source-tabs { display: flex; gap: 10px; margin-bottom: 15px; margin-top: 5px; }
        .source-tab { flex: 1; text-align: center; padding: 8px; background: #e2e8f0; border-radius: 30px; cursor: pointer; font-size: 0.8rem; }
        .source-tab.active { background: #2563eb; color: white; }
        .photo-buttons { display: flex; gap: 12px; margin-bottom: 15px; }
        .photo-btn { flex: 1; padding: 14px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .camera-btn { background: #2563eb; color: white; }
        .gallery-btn { background: #10b981; color: white; }
        .preview-img { width: 100%; max-height: 150px; object-fit: cover; border-radius: 12px; margin-top: 10px; }
        
        .product-item { background: white; border-radius: 16px; padding: 12px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; border: 1px solid #e2e8f0; }
        .product-img { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; background: #e2e8f0; cursor: pointer; }
        .product-info { flex: 1; }
        .product-name-stok0 { font-weight: bold; font-size: 0.9rem; color: #dc2626; }
        .product-name-stok1 { font-weight: bold; font-size: 0.9rem; color: #2563eb; }
        .product-name-stok2plus { font-weight: bold; font-size: 0.9rem; color: #1e293b; }
        .stock-buttons { display: flex; gap: 6px; }
        .stock-btn { width: 38px; height: 38px; border-radius: 20px; border: 1px solid #e2e8f0; background: white; font-size: 1.2rem; cursor: pointer; }
        .delete-btn { background: #fee2e2; color: #dc2626; border: none; }
        .edit-btn { color: #2563eb; font-size: 0.7rem; margin-top: 5px; display: inline-block; cursor: pointer; background: #eff6ff; padding: 4px 10px; border-radius: 30px; }
        .stok-badge { display: inline-block; padding: 2px 8px; border-radius: 30px; font-size: 0.7rem; font-weight: bold; margin-left: 5px; }
        .stok-habis { background: #fee2e2; color: #dc2626; }
        .stok-sedikit { background: #dbeafe; color: #2563eb; }
        .stok-banyak { background: #dcfce7; color: #16a34a; }
        
        .info-stats { background: #e2e8f0; border-radius: 30px; padding: 8px 15px; margin-bottom: 15px; font-size: 0.8rem; display: flex; justify-content: space-between; }
        .load-more { text-align: center; padding: 12px; background: #e2e8f0; border-radius: 40px; margin: 10px 0; cursor: pointer; font-weight: bold; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: white; border-top: 1px solid #e2e8f0; padding: 8px 0 12px; }
        .nav-item { flex: 1; text-align: center; padding: 8px; cursor: pointer; color: #94a3b8; font-weight: bold; font-size: 0.7rem; }
        .nav-item.active { color: #2563eb; background: #eff6ff; }
        .nav-item span { font-size: 1.5rem; display: block; margin-bottom: 3px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-img { max-width: 90%; max-height: 80%; border-radius: 12px; }
        .modal-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 2rem; cursor: pointer; background: rgba(255,255,255,0.2); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .toast { position: fixed; bottom: 80px; left: 20px; right: 20px; background: #1e293b; color: white; padding: 12px; border-radius: 40px; text-align: center; z-index: 1000; font-size: 0.85rem; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        .empty-state { text-align: center; padding: 50px 20px; color: #94a3b8; }
        
        /* Modal Folder */
        .modal-folder { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 300; align-items: center; justify-content: center; }
        .modal-folder-content { background: white; border-radius: 32px; width: 90%; max-width: 350px; padding: 24px; text-align: center; }
        .modal-folder-content input { width: 100%; padding: 12px; border-radius: 40px; border: 1px solid #cbd5e1; margin: 15px 0; }
        .cover-selector { display: flex; gap: 10px; margin: 10px 0; }
        .cover-preview { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; background: #e2e8f0; cursor: pointer; }
        
        .select-folder-list { max-height: 200px; overflow-y: auto; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 16px; }
        .select-folder-option { padding: 10px; border-bottom: 1px solid #e2e8f0; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .select-folder-option:active { background: #f1f5f9; }
        .folder-tree { margin-left: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h2>🏍️ Striping Pro</h2>
    <div style="display: flex; gap: 10px; align-items: center;">
        <span id="syncStatus" class="sync-status" onclick="manualSync()">💾 Online</span>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>
</div>

<div id="menuDropdown" class="menu-dropdown">
    <div class="menu-item" onclick="exportBackup()">💾 Backup ke File</div>
    <div class="menu-item" onclick="showRestoreModal()">📂 Restore dari File</div>
    <div class="menu-item" onclick="manualSync()">🔄 Sinkronisasi Manual</div>
    <div class="menu-item" onclick="exportToCSV()">📊 Export ke CSV</div>
    <div class="menu-item" onclick="showStorageInfo()">💿 Info Penyimpanan</div>
    <div class="menu-item danger" onclick="clearAllData()">⚠️ Hapus Semua Data</div>
</div>

<!-- Breadcrumb Navigation -->
<div id="breadcrumbBar" class="breadcrumb"></div>

<!-- LAYAR FOLDER (HOME) -->
<div id="screenFolders">
    <div class="search-wrapper">
        <input type="text" id="searchFolder" class="search-box" placeholder="🔍 Cari folder atau produk..." oninput="filterCurrentFolders()">
    </div>
    <div id="foldersGridContainer" class="folders-grid"></div>
    <button class="add-folder-btn-fixed" onclick="showAddSubFolderModal()">+ Tambah Folder</button>
</div>

<!-- LAYAR PRODUK DALAM FOLDER -->
<div id="screenProducts" class="hidden">
    <div class="search-wrapper">
        <input type="text" id="searchProduct" class="search-box" placeholder="🔍 Cari produk..." oninput="filterProducts()">
    </div>
    <div class="main-content" style="padding-top:0">
        <div id="productHeader" class="card" style="padding:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center">
            <div><span id="currentFolderName">Folder</span> <span id="folderProductCount"></span></div>
            <button class="btn-primary" style="width:auto; padding:8px 16px; margin:0" onclick="backToFolders()">◀ Kembali</button>
        </div>
        <div id="infoStats" class="info-stats">
            <span id="totalProduk">0 produk</span>
            <span id="tampilProduk">Menampilkan 0</span>
        </div>
        <div id="listContainer"></div>
        <div id="loadMoreBtn" class="load-more hidden" onclick="loadMore()">📥 Load More...</div>
    </div>
</div>

<!-- LAYAR TAMBAH/EDIT PRODUK -->
<div id="screenAddEdit" class="hidden">
    <div class="main-content">
        <div class="card">
            <h3 id="formTitle">➕ Tambah Produk</h3>
            <input type="hidden" id="editId">
            <label class="form-label">📁 FOLDER (Pilih lokasi)</label>
            <div id="folderSelectContainer" style="border:1px solid #e2e8f0; border-radius:16px; padding:8px; margin-bottom:15px; max-height:200px; overflow-y:auto;"></div>
            <label class="form-label">📛 NAMA PRODUK</label>
            <input type="text" id="nama" class="form-input" placeholder="Contoh: Stiker Racing">
            <label class="form-label">📦 STOK AWAL</label>
            <input type="number" id="initialStock" class="form-input" value="0" min="0">
            <div class="image-source-tabs">
                <div class="source-tab active" onclick="setImageSource('url')">🔗 Link URL</div>
                <div class="source-tab" onclick="setImageSource('camera')">📸 Kamera/Galeri</div>
            </div>
            <div id="urlInputSection"><input type="text" id="fotoUrl" class="form-input" placeholder="https://..."></div>
            <div id="cameraInputSection" class="hidden">
                <div class="photo-buttons"><button class="photo-btn camera-btn" onclick="openCamera()">📷 Kamera</button><button class="photo-btn gallery-btn" onclick="openGallery()">🖼️ Galeri</button></div>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleImageUpload(this)">
                <input type="file" id="galleryInput" accept="image/*" style="display:none" onchange="handleImageUpload(this)">
                <div id="previewContainer" class="hidden"><img id="previewImage" class="preview-img"><button class="btn-primary" style="background:#64748b; margin-top:5px;" onclick="clearPreview()">Hapus</button></div>
            </div>
            <button class="btn-primary" onclick="simpanProduk()">💾 SIMPAN</button>
            <button class="btn-primary btn-cancel" onclick="backToProducts()">BATAL</button>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="showScreen('folders')"><span>📁</span>FOLDER</div>
    <div class="nav-item" onclick="showScreen('addEdit')"><span>➕</span>TAMBAH</div>
</div>

<!-- MODALS -->
<div id="zoomModal" class="modal" onclick="closeZoom()"><div class="modal-close">✕</div><img id="zoomImg" class="modal-img"></div>
<div id="modalRestore" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:2000; align-items:center; justify-content:center;"><div style="background:white; padding:25px; border-radius:30px; width:300px; text-align:center;"><h3>Restore</h3><input type="file" id="restoreFile" accept=".json"><button class="btn-primary" onclick="restoreFromFile()">RESTORE</button><button onclick="closeRestoreModal()">Batal</button></div></div>
<div id="folderModal" class="modal-folder"><div class="modal-folder-content"><h3 id="folderModalTitle">Tambah Folder</h3><input type="text" id="folderNameInput" placeholder="Nama folder"><div class="cover-selector"><button class="photo-btn camera-btn" style="flex:1" onclick="openFolderCoverCamera()">📷 Cover</button><button class="photo-btn gallery-btn" style="flex:1" onclick="openFolderCoverGallery()">🖼️ Galeri</button></div><img id="folderCoverPreview" class="cover-preview" style="width:100%; height:100px; object-fit:cover; margin:10px 0"><input type="file" id="folderCoverInput" accept="image/*" style="display:none" onchange="handleFolderCover(this)"><button class="btn-primary" onclick="saveFolder()">Simpan</button><button class="btn-cancel btn-primary" onclick="closeFolderModal()">Batal</button></div></div>

<script>
    // ==================== DATA MODEL NESTED FOLDER ====================
    // Struktur folder: setiap folder punya id, name, parentId (null untuk root), children (array), cover
    let folders = []; // array of {id, name, parentId, cover}
    let dbData = []; // produk {id, nama, folderId, foto, stok}
    let nextFolderId = 100;
    
    let currentFolderId = null; // folder yang sedang dibuka (null = root)
    let filteredProducts = [];
    let currentPage = 0;
    const ITEMS_PER_PAGE = 30;
    let currentImageSource = 'url';
    let pendingImageData = null;
    let pendingFolderCover = null;
    let editingFolderId = null;
    
    // Helper Functions
    function getFolderById(id) { return folders.find(f => f.id == id); }
    function getSubFolders(parentId) { return folders.filter(f => f.parentId == parentId); }
    function getProductsInFolder(folderId) { return dbData.filter(p => p.folderId == folderId); }
    function getAllDescendantFolderIds(parentId) { let ids = []; let childs = getSubFolders(parentId); for(let c of childs) { ids.push(c.id); ids.push(...getAllDescendantFolderIds(c.id)); } return ids; }
    function getFolderPath(folderId) { let path = []; let cur = getFolderById(folderId); while(cur) { path.unshift(cur); cur = getFolderById(cur.parentId); } return path; }
    
    // Load/Save IndexedDB
    const DB_NAME = 'StripNestedDB';
    const DB_VERSION = 2;
    function openDB() { return new Promise((resolve, reject) => { const r = indexedDB.open(DB_NAME, DB_VERSION); r.onerror = () => reject(r.error); r.onsuccess = () => resolve(r.result); r.onupgradeneeded = (e) => { const db = e.target.result; if(!db.objectStoreNames.contains('folders')) db.createObjectStore('folders', { keyPath: 'id' }); if(!db.objectStoreNames.contains('produk')) db.createObjectStore('produk', { keyPath: 'id' }); }; }); }
    async function saveAll() { const db = await openDB(); const tx = db.transaction(['folders','produk'], 'readwrite'); const folderStore = tx.objectStore('folders'); const produkStore = tx.objectStore('produk'); await folderStore.clear(); for(let f of folders) await folderStore.put(f); await produkStore.clear(); for(let p of dbData) await produkStore.put(p); return new Promise(r => { tx.oncomplete = r; }); }
    async function loadAll() { const db = await openDB(); const folderList = await new Promise(r => { db.transaction('folders').objectStore('folders').getAll().onsuccess = e => r(e.target.result || []); }); const produkList = await new Promise(r => { db.transaction('produk').objectStore('produk').getAll().onsuccess = e => r(e.target.result || []); }); if(folderList.length) folders = folderList; else { folders = []; nextFolderId = 100; addRootFolder("HONDA"); addRootFolder("YAMAHA"); addRootFolder("SUZUKI"); addRootFolder("KAWASAKI"); addRootFolder("SMASH"); addRootFolder("SHOGUN"); } dbData = produkList; }
    function addRootFolder(name) { folders.push({ id: nextFolderId++, name: name, parentId: null, cover: null }); }
    
    // Render Breadcrumb
    function renderBreadcrumb() { const container = document.getElementById('breadcrumbBar'); if(!currentFolderId) { container.innerHTML = '<span class="breadcrumb-current">📁 Semua Folder</span>'; return; } const path = getFolderPath(currentFolderId); let html = '<span class="breadcrumb-item" onclick="navigateToFolder(null)">🏠 Root</span><span class="breadcrumb-sep">›</span>'; path.forEach((f, idx) => { if(idx === path.length-1) html += `<span class="breadcrumb-current">📁 ${escapeHtml(f.name)}</span>`; else html += `<span class="breadcrumb-item" onclick="navigateToFolder(${f.id})">📁 ${escapeHtml(f.name)}</span><span class="breadcrumb-sep">›</span>`; }); container.innerHTML = html; }
    function navigateToFolder(folderId) { currentFolderId = folderId; renderBreadcrumb(); renderFoldersGrid(); if(!currentFolderId) document.getElementById('searchFolder').value = ''; filterCurrentFolders(); }
    
    // Render Folder Grid
    function renderFoldersGrid() { const container = document.getElementById('foldersGridContainer'); const search = document.getElementById('searchFolder')?.value.toLowerCase() || ''; let foldersToShow = getSubFolders(currentFolderId); if(search) { foldersToShow = foldersToShow.filter(f => f.name.toLowerCase().includes(search) || getProductsInFolder(f.id).some(p => p.nama.toLowerCase().includes(search))); } container.innerHTML = foldersToShow.map(f => { const count = getProductsInFolder(f.id).length; const childCount = getSubFolders(f.id).length; let coverUrl = f.cover; if(!coverUrl) { const firstProduct = getProductsInFolder(f.id)[0]; coverUrl = firstProduct?.foto || 'https://via.placeholder.com/150?text=Folder'; } return `<div class="folder-card" onclick="openFolderContent(${f.id})"><div class="folder-cover" style="background-image: url('${coverUrl}'); background-size: cover;"><span class="folder-badge">📄${count} 🗂️${childCount}</span></div><div class="folder-info"><div class="folder-name"><span>📁 ${escapeHtml(f.name)}</span></div><div class="folder-actions"><button class="folder-action-btn subfolder" onclick="event.stopPropagation(); showAddSubFolderModal(${f.id})">➕ Sub</button><button class="folder-action-btn edit" onclick="event.stopPropagation(); editFolder(${f.id})">✏️</button><button class="folder-action-btn delete" onclick="event.stopPropagation(); deleteFolder(${f.id})">🗑️</button></div></div></div>`; }).join(''); if(foldersToShow.length===0 && !currentFolderId) container.innerHTML='<div class="empty-state" style="grid-column:1/-1">📭 Belum ada folder. Tekan + Tambah Folder</div>'; else if(foldersToShow.length===0) container.innerHTML='<div class="empty-state" style="grid-column:1/-1">📭 Tidak ada sub-folder di sini</div>'; }
    function filterCurrentFolders() { renderFoldersGrid(); }
    
    function openFolderContent(folderId) { currentFolderId = folderId; renderBreadcrumb(); renderFoldersGrid(); document.getElementById('searchFolder').value = ''; }
    function backToFolders() { if(currentFolderId) { const parent = getFolderById(currentFolderId)?.parentId; currentFolderId = parent !== undefined ? parent : null; renderBreadcrumb(); renderFoldersGrid(); } else { showScreen('folders'); } }
    
    function showAddSubFolderModal(parentId = null) { editingFolderId = null; document.getElementById('folderModalTitle').innerText = parentId ? "Tambah Sub Folder" : "Tambah Folder Baru"; document.getElementById('folderNameInput').value = ''; document.getElementById('folderNameInput').style.display = 'block'; pendingFolderCover = null; document.getElementById('folderCoverPreview').src = 'https://via.placeholder.com/200'; document.getElementById('folderModal').style.display = 'flex'; window.tempParentId = parentId !== null ? parentId : currentFolderId; }
    function editFolder(folderId) { const f = getFolderById(folderId); if(!f) return; editingFolderId = folderId; document.getElementById('folderModalTitle').innerText = "Edit Folder"; document.getElementById('folderNameInput').value = f.name; document.getElementById('folderNameInput').style.display = 'block'; pendingFolderCover = f.cover; document.getElementById('folderCoverPreview').src = f.cover || 'https://via.placeholder.com/200'; document.getElementById('folderModal').style.display = 'flex'; window.tempParentId = f.parentId; }
    function closeFolderModal() { document.getElementById('folderModal').style.display = 'none'; editingFolderId = null; }
    function openFolderCoverCamera() { document.getElementById('folderCoverInput').setAttribute('capture', 'environment'); document.getElementById('folderCoverInput').click(); }
    function openFolderCoverGallery() { document.getElementById('folderCoverInput').removeAttribute('capture'); document.getElementById('folderCoverInput').click(); }
    async function handleFolderCover(input) { const file = input.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (e) => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); let w=img.width, h=img.height; if(w>400) { h=(h*400)/w; w=400; } canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h); const base64 = canvas.toDataURL('image/jpeg',0.7); pendingFolderCover = base64; document.getElementById('folderCoverPreview').src = base64; }; img.src = e.target.result; }; reader.readAsDataURL(file); input.value=''; }
    async function saveFolder() { let name = document.getElementById('folderNameInput').value.trim(); if(!name) return showToast("Nama folder wajib"); if(editingFolderId) { const idx = folders.findIndex(f => f.id == editingFolderId); if(idx!==-1) { folders[idx].name = name; if(pendingFolderCover) folders[idx].cover = pendingFolderCover; } } else { const parentId = window.tempParentId !== undefined ? window.tempParentId : null; if(folders.some(f => f.parentId == parentId && f.name === name)) return showToast("Nama folder sudah ada di level ini"); folders.push({ id: nextFolderId++, name: name, parentId: parentId, cover: pendingFolderCover || null }); } await saveAll(); renderFoldersGrid(); closeFolderModal(); showToast(`Folder ${editingFolderId?'diupdate':'ditambah'}`); }
    async function deleteFolder(folderId) { const f = getFolderById(folderId); if(!f) return; const descendantIds = getAllDescendantFolderIds(folderId); const allDeleteIds = [folderId, ...descendantIds]; const productCount = dbData.filter(p => allDeleteIds.includes(p.folderId)).length; if(confirm(`Hapus folder "${f.name}" dan ${productCount} produk di dalamnya?`)) { dbData = dbData.filter(p => !allDeleteIds.includes(p.folderId)); folders = folders.filter(f => !allDeleteIds.includes(f.id)); await saveAll(); if(currentFolderId && allDeleteIds.includes(currentFolderId)) currentFolderId = getFolderById(f.parentId)?.id || null; renderBreadcrumb(); renderFoldersGrid(); showToast("Folder dihapus"); } }
    
    // Product Management dengan folderId
    function showProductList(folderId) { currentFolderId = folderId; const folder = getFolderById(folderId); if(!folder) return; filteredProducts = [...getProductsInFolder(folderId)]; filteredProducts.sort((a,b)=>{ let sa=a.stok||0, sb=b.stok||0; if(sa===0 && sb!==0) return -1; if(sa!==0 && sb===0) return 1; return a.nama.localeCompare(b.nama); }); currentPage=0; document.getElementById('currentFolderName').innerHTML = `📁 ${escapeHtml(folder.name)}`; document.getElementById('folderProductCount').innerHTML = `${filteredProducts.length} produk`; renderProductList(); showScreen('products'); }
    function renderProductList() { const start = currentPage*ITEMS_PER_PAGE; const pageItems = filteredProducts.slice(start, start+ITEMS_PER_PAGE); const container = document.getElementById('listContainer'); if(pageItems.length===0) container.innerHTML='<div class="empty-state"><span>📭</span><p>Tidak ada produk</p></div>'; else container.innerHTML = pageItems.map(item => { const stock=item.stok||0; const nameClass=stock===0?'product-name-stok0':(stock===1?'product-name-stok1':'product-name-stok2plus'); const badge=stock===0?'<span class="stok-badge stok-habis">HABIS</span>':(stock===1?'<span class="stok-badge stok-sedikit">SISA 1</span>':'<span class="stok-badge stok-banyak">AMAN</span>'); return `<div class="product-item"><img class="product-img" src="${item.foto||'https://via.placeholder.com/65'}" onclick="openZoom('${item.foto}')" onerror="this.src='https://via.placeholder.com/65'"><div class="product-info"><div class="${nameClass}">${escapeHtml(item.nama)} ${badge}</div><div class="product-stok">📦 Stok: <b>${stock}</b></div><div class="edit-btn" onclick="editProduk(${item.id})">✏️ EDIT</div></div><div class="stock-buttons"><button class="stock-btn" onclick="ubahStok(${item.id}, -1)">−</button><button class="stock-btn" onclick="ubahStok(${item.id}, 1)">+</button><button class="stock-btn delete-btn" onclick="hapusProduk(${item.id})">🗑️</button></div></div>`; }).join(''); const loadBtn = document.getElementById('loadMoreBtn'); if(filteredProducts.length > (currentPage+1)*ITEMS_PER_PAGE) loadBtn.classList.remove('hidden'); else loadBtn.classList.add('hidden'); document.getElementById('tampilProduk').innerHTML = `Menampilkan ${Math.min(filteredProducts.length, (currentPage+1)*ITEMS_PER_PAGE)} dari ${filteredProducts.length}`; document.getElementById('totalProduk').innerHTML = `${dbData.length} total`; }
    function filterProducts() { const kw = document.getElementById('searchProduct')?.value.toLowerCase() || ''; if(currentFolderId) filteredProducts = getProductsInFolder(currentFolderId).filter(p => p.nama.toLowerCase().includes(kw)); else filteredProducts = []; filteredProducts.sort((a,b)=>a.nama.localeCompare(b.nama)); currentPage=0; renderProductList(); }
    function loadMore() { currentPage++; renderProductList(); }
    async function ubahStok(id, delta) { const idx = dbData.findIndex(p => p.id == id); if(idx!==-1) { const newStok = Math.max(0, (dbData[idx].stok||0)+delta); dbData[idx].stok = newStok; await saveAll(); if(currentFolderId) showProductList(currentFolderId); showToast(`Stok: ${newStok}`); } }
    async function hapusProduk(id) { if(confirm("Hapus produk?")) { dbData = dbData.filter(p => p.id !== id); await saveAll(); if(currentFolderId) showProductList(currentFolderId); renderFoldersGrid(); showToast("Produk dihapus"); } }
    function editProduk(id) { const p = dbData.find(x => x.id == id); if(!p) return; document.getElementById('editId').value = p.id; document.getElementById('nama').value = p.nama; document.getElementById('initialStock').value = p.stok || 0; if(p.foto && p.foto.startsWith('data:image')) { setImageSource('camera'); pendingImageData = p.foto; document.getElementById('previewImage').src = p.foto; document.getElementById('previewContainer').classList.remove('hidden'); } else { setImageSource('url'); document.getElementById('fotoUrl').value = p.foto || ''; } showScreen('addEdit'); document.getElementById('formTitle').innerText = '✏️ Edit Produk'; renderFolderSelector(p.folderId); }
    function renderFolderSelector(selectedId) { const container = document.getElementById('folderSelectContainer'); const buildTree = (parentId, level=0) => { let html = ''; const subs = folders.filter(f => f.parentId == parentId); for(let f of subs) { html += `<div class="select-folder-option" style="padding-left:${level*20+10}px" onclick="selectFolder(${f.id})">📁 ${escapeHtml(f.name)}</div>`; html += buildTree(f.id, level+1); } return html; }; container.innerHTML = buildTree(null); if(selectedId) { container.querySelectorAll('.select-folder-option').forEach(opt => { if(opt.textContent.includes(getFolderById(selectedId)?.name)) opt.style.background = "#dbeafe"; }); } }
    let selectedFolderId = null;
    function selectFolder(folderId) { selectedFolderId = folderId; document.getElementById('folderSelectContainer').querySelectorAll('.select-folder-option').forEach(opt => opt.style.background = ""); event.target.style.background = "#dbeafe"; }
    async function simpanProduk() { const id = document.getElementById('editId').value; const nama = document.getElementById('nama').value.trim(); let folderId = selectedFolderId || currentFolderId; if(!folderId && folders.length>0) folderId = folders[0].id; if(!folderId) return showToast("Pilih folder terlebih dahulu!"); const stokAwal = parseInt(document.getElementById('initialStock').value) || 0; if(!nama) return showToast("Nama wajib!"); let foto = ''; if(currentImageSource === 'url') foto = document.getElementById('fotoUrl').value.trim() || "https://via.placeholder.com/200"; else foto = pendingImageData || "https://via.placeholder.com/200"; if(id) { const idx = dbData.findIndex(p => p.id == id); if(idx!==-1) dbData[idx] = {...dbData[idx], nama, folderId, foto, stok: stokAwal }; } else { dbData.push({ id: Date.now(), nama, folderId, foto, stok: stokAwal }); } clearPreview(); await saveAll(); renderFoldersGrid(); if(currentFolderId && currentFolderId == folderId) showProductList(folderId); else if(currentFolderId) showProductList(currentFolderId); else showScreen('folders'); showToast("Produk tersimpan"); resetForm(); }
    function resetForm() { document.getElementById('editId').value=''; document.getElementById('nama').value=''; document.getElementById('fotoUrl').value=''; document.getElementById('initialStock').value='0'; clearPreview(); setImageSource('url'); selectedFolderId = null; if(currentFolderId) renderFolderSelector(currentFolderId); else renderFolderSelector(null); }
    
    // Utilities
    function setImageSource(src) { currentImageSource=src; document.getElementById('urlInputSection').classList.toggle('hidden', src!=='url'); document.getElementById('cameraInputSection').classList.toggle('hidden', src!=='camera'); document.querySelectorAll('.source-tab').forEach((t,i)=>t.classList.toggle('active', (src==='url'?i===0:i===1))); }
    function openCamera() { document.getElementById('cameraInput').click(); }
    function openGallery() { document.getElementById('galleryInput').click(); }
    async function handleImageUpload(input) { const file=input.files[0]; if(!file) return; if(file.size>5*1024*1024) { showToast("Max 5MB"); input.value=''; return; } const reader = new FileReader(); reader.onload = (e) => { const img=new Image(); img.onload=()=>{ const canvas=document.createElement('canvas'); let w=img.width, h=img.height; if(w>800) { h=(h*800)/w; w=800; } canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h); const base64=canvas.toDataURL('image/jpeg',0.7); pendingImageData=base64; document.getElementById('previewImage').src=base64; document.getElementById('previewContainer').classList.remove('hidden'); showToast("Foto siap"); }; img.src=e.target.result; }; reader.readAsDataURL(file); input.value=''; }
    function clearPreview() { pendingImageData=null; document.getElementById('previewContainer').classList.add('hidden'); document.getElementById('previewImage').src=''; }
    function openZoom(url) { document.getElementById('zoomImg').src=url; document.getElementById('zoomModal').style.display='flex'; }
    function closeZoom() { document.getElementById('zoomModal').style.display='none'; }
    function showScreen(screen) { document.getElementById('screenFolders').classList.toggle('hidden', screen!=='folders'); document.getElementById('screenProducts').classList.toggle('hidden', screen!=='products'); document.getElementById('screenAddEdit').classList.toggle('hidden', screen!=='addEdit'); document.getElementById('breadcrumbBar').classList.toggle('hidden', screen!=='folders'); document.querySelectorAll('.nav-item').forEach((el,i)=>el.classList.toggle('active', (screen==='folders'&&i===0)||(screen==='addEdit'&&i===1))); if(screen==='addEdit') { renderFolderSelector(currentFolderId); selectedFolderId = currentFolderId; } if(screen==='folders') { renderFoldersGrid(); renderBreadcrumb(); } }
    function showToast(msg) { let t=document.querySelector('.toast'); if(t) t.remove(); t=document.createElement('div'); t.className='toast'; t.innerHTML=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    function toggleMenu() { document.getElementById('menuDropdown').classList.toggle('show'); }
    async function exportBackup() { const data=JSON.stringify({app:"StripNested",version:2,folders,payload:dbData}); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([data])); a.download=`backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); showToast("Backup OK"); }
    function showRestoreModal() { document.getElementById('modalRestore').style.display='flex'; toggleMenu(); }
    function closeRestoreModal() { document.getElementById('modalRestore').style.display='none'; }
    async function restoreFromFile() { const file=document.getElementById('restoreFile').files[0]; if(!file) return; const reader=new FileReader(); reader.onload=async(e)=>{ try{ const json=JSON.parse(e.target.result); if(json.app==="StripNested" && json.payload){ folders=json.folders; dbData=json.payload; await saveAll(); renderFoldersGrid(); showToast(`Restore ${dbData.length} produk`); closeRestoreModal(); } else showToast("Format salah"); }catch(err){ showToast("File corrupt"); } }; reader.readAsText(file); }
    async function clearAllData() { if(confirm("⚠️ HAPUS SEMUA DATA?")){ dbData=[]; folders=[]; nextFolderId=100; addRootFolder("HONDA"); addRootFolder("YAMAHA"); addRootFolder("SUZUKI"); addRootFolder("KAWASAKI"); addRootFolder("SMASH"); addRootFolder("SHOGUN"); await saveAll(); renderFoldersGrid(); showToast("Semua data dihapus"); toggleMenu(); } }
    async function manualSync() { await saveAll(); updateOnlineStatus(); showToast("Sinkron selesai"); }
    function updateOnlineStatus() { const el=document.getElementById('syncStatus'); if(navigator.onLine){ el.innerHTML='✅ Online'; el.classList.remove('offline'); } else { el.innerHTML='📴 Offline'; el.classList.add('offline'); } }
    async function exportToCSV() { let csv="ID,Nama,FolderPath,Stok\n"; for(const p of dbData) { let f=getFolderById(p.folderId); let path = f ? getFolderPath(p.folderId).map(f=>f.name).join('/') : 'Root'; csv+=`"${p.id}","${escapeCsv(p.nama)}","${path}","${p.stok||0}"\n`; } const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv])); a.download=`stok_${new Date().toISOString().slice(0,10)}.csv`; a.click(); showToast("CSV export"); }
    function escapeCsv(str){ return String(str).replace(/"/g,'""'); }
    function escapeHtml(str){ if(!str) return ''; return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function showStorageInfo() { showToast("💿 " + (dbData.length*0.5).toFixed(0) + " KB estimasi"); toggleMenu(); }
    document.addEventListener('click',(e)=>{ const menu=document.getElementById('menuDropdown'); const btn=document.querySelector('.menu-btn'); if(menu&&menu.classList.contains('show')&&!menu.contains(e.target)&&!btn.contains(e.target)) menu.classList.remove('show'); });
    window.addEventListener('online',()=>{ updateOnlineStatus(); showToast('🌐 Online'); });
    window.addEventListener('offline',()=>{ updateOnlineStatus(); showToast('📴 Offline'); });
    
    async function init() { await loadAll(); renderFoldersGrid(); showScreen('folders'); updateOnlineStatus(); }
    init();
</script>
</body>
</html>
