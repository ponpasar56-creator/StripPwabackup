<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>Stok Strip Pro - Manajemen Stok & Folder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f1f5f9; padding-bottom: 70px; -webkit-tap-highlight-color: transparent; }
        .zoom-container { width: 100%; min-height: 100vh; transition: transform 0.1s ease; transform-origin: 0 0; }
        .header { background: #0f172a; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header h2 { font-size: 1.2rem; }
        .sync-status { background: #10b981; border-radius: 30px; padding: 5px 12px; font-size: 0.7rem; cursor: pointer; }
        .menu-btn { background: rgba(255, 255, 255, 0.2); border: none; color: white; font-size: 1.3rem; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
        .menu-dropdown { position: absolute; top: 60px; right: 15px; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); width: 250px; z-index: 200; display: none; }
        .menu-dropdown.show { display: block; }
        .menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #e2e8f0; }
        .menu-item.danger { color: #dc2626; }
        .folders-container { padding: 0 15px 15px 15px; }
        .main-folder { margin-bottom: 20px; border-radius: 20px; background: white; overflow: hidden; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); }
        .main-folder-header { background: #0f172a; color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .main-folder-title { font-weight: bold; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        .main-folder-action-btn { background: rgba(255, 255, 255, 0.2); border: none; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; }
        .sub-folders { background: #f8fafc; padding: 8px; display: none; }
        .sub-folders.show { display: block; }
        .sub-folder-card { background: white; border-radius: 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; cursor: pointer; min-height: 65px; }
        .sub-folder-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        .sub-folder-cover { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; background: #cbd5e1; }
        .sub-folder-name { font-weight: bold; font-size: 0.9rem; word-break: break-word; }
        .sub-folder-badge { font-size: 0.7rem; color: #64748b; }
        .sub-folder-btn { background: #f1f5f9; border: none; font-size: 0.7rem; padding: 4px 8px; border-radius: 20px; cursor: pointer; }
        .add-sub-folder { background: #e2e8f0; border-radius: 30px; padding: 8px 12px; text-align: center; margin-top: 8px; cursor: pointer; color: #475569; font-size: 0.8rem; }
        .product-item { background: white; border-radius: 16px; padding: 12px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; border: 1px solid #e2e8f0; min-height: 89px; }
        .product-img { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; background: #cbd5e1; }
        .product-info { flex: 1; min-width: 0; }
        .product-name-stok0 { font-weight: bold; font-size: 0.9rem; color: #dc2626; }
        .product-name-stok1_3 { font-weight: bold; font-size: 0.9rem; color: #2563eb; }
        .product-name-stok4plus { font-weight: bold; font-size: 0.9rem; color: #1e293b; }
        .stock-btn { width: 38px; height: 38px; border-radius: 20px; border: 1px solid #e2e8f0; background: white; font-size: 1.2rem; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: white; border-top: 1px solid #e2e8f0; padding: 8px 0 12px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 8px; cursor: pointer; color: #94a3b8; font-weight: bold; font-size: 0.7rem; }
        .nav-item.active { color: #2563eb; background: #eff6ff; }
        .nav-item span { font-size: 1.5rem; display: block; margin-bottom: 3px; }
        .toast { position: fixed; bottom: 80px; left: 20px; right: 20px; background: #1e293b; color: white; padding: 12px; border-radius: 40px; text-align: center; z-index: 1000; font-size: 0.85rem; }
        .hidden { display: none !important; }
        .modal-folder { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); z-index: 300; align-items: center; justify-content: center; }
        .modal-folder-content { background: white; border-radius: 32px; width: 90%; max-width: 350px; padding: 24px; text-align: center; }
        .form-input, .form-select { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #e2e8f0; margin-bottom: 15px; font-size: 1rem; background: white; }
        .btn-primary { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .search-box { width: 100%; padding: 12px 16px; border-radius: 30px; border: 1px solid #e2e8f0; margin-bottom: 12px; }
        .zoom-controls { position: fixed; bottom: 80px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 150; background: rgba(15, 23, 42, 0.9); border-radius: 40px; padding: 8px; }
        .zoom-btn { width: 44px; height: 44px; border-radius: 50%; background: #2563eb; color: white; border: none; font-size: 1.3rem; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="zoom-container" id="zoomContainer">
    <div class="header">
        <h2>🏍️ Striping Pro</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span id="syncStatus" class="sync-status">💾 Online</span>
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
        </div>
    </div>

    <div id="menuDropdown" class="menu-dropdown">
        <div class="menu-item" onclick="exportBackup()">💾 Backup</div>
        <div class="menu-item" onclick="showRestoreModal()">📂 Restore</div>
        <div class="menu-item danger" onclick="clearAllData()">⚠️ Hapus Semua</div>
    </div>

    <div id="screenFolders">
        <div style="padding: 12px 15px;">
            <input type="text" id="searchFolder" class="search-box" placeholder="🔍 Cari folder atau produk..." oninput="renderMainFolders()">
        </div>
        <div id="mainFoldersContainer" class="folders-container"></div>
        <button class="btn-primary" style="width: 200px; margin: 10px auto; display: block;" onclick="showAddMainFolderModal()">+ Main Folder</button>
    </div>

    <div id="screenProducts" class="hidden">
        <div style="padding: 12px 15px;">
            <div style="display:flex; justify-content:space-between; align-items:center; background:white; padding:10px; border-radius:15px; margin-bottom:10px;">
                <button class="btn-primary" style="width:auto; padding:8px 15px; margin:0; background:#64748b" onclick="goBack()">◀ Kembali</button>
                <div id="currentSubFolderName" style="font-weight:bold; font-size:0.9rem">Folder</div>
                <button class="btn-primary" style="width:auto; padding:8px 15px; margin:0; background:#10b981" onclick="showAddProduct()">+ Produk</button>
            </div>
            <input type="text" id="searchProduct" class="search-box" placeholder="🔍 Cari produk di folder ini..." oninput="filterProducts()">
            <div id="listContainer"></div>
        </div>
    </div>

    <div id="screenAddEdit" class="hidden">
        <div style="padding: 20px;">
            <div class="modal-folder-content" style="width:100%; max-width:none;">
                <h3 id="formTitle">Tambah Produk</h3>
                <input type="hidden" id="editId">
                <label style="font-size:0.7rem; display:block; text-align:left; margin-top:10px;">FOLDER TUJUAN</label>
                <select id="subFolderSelect" class="form-select"></select>
                <input type="text" id="nama" class="form-input" placeholder="Nama Produk">
                <input type="number" id="initialStock" class="form-input" placeholder="Stok Awal" value="0">
                <input type="text" id="fotoUrl" class="form-input" placeholder="Link Foto (Opsional)">
                <button class="btn-primary" onclick="simpanProduk()">💾 SIMPAN</button>
                <button class="btn-primary" style="background:#64748b" onclick="backToProducts()">BATAL</button>
            </div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" id="navFolders" onclick="showScreen('folders')"><span>📁</span>FOLDER</div>
    <div class="nav-item" id="navAdd" onclick="showAddProduct()"><span>➕</span>TAMBAH</div>
</div>

<div class="zoom-controls">
    <button class="zoom-btn" onclick="zoomIn()">🔍+</button>
    <button class="zoom-btn" style="background:#64748b; font-size:1rem;" onclick="resetZoom()">⟳</button>
</div>

<div id="folderModal" class="modal-folder">
    <div class="modal-folder-content">
        <h3 id="folderModalTitle">Folder Baru</h3>
        <input type="text" id="folderNameInput" class="form-input" placeholder="Nama Folder">
        <button class="btn-primary" onclick="saveFolderModal()">Simpan</button>
        <button class="btn-primary" style="background:#64748b" onclick="closeFolderModal()">Batal</button>
    </div>
</div>

<script>
    let mainFolders = [];
    let currentSubFolder = null; // {mainIdx, subIdx}
    let currentZoom = 1;

    // ==================== NAVIGASI FIX ====================
    function showScreen(screen) {
        document.getElementById('screenFolders').classList.toggle('hidden', screen !== 'folders');
        document.getElementById('screenProducts').classList.toggle('hidden', screen !== 'products');
        document.getElementById('screenAddEdit').classList.toggle('hidden', screen !== 'addEdit');
        
        document.getElementById('navFolders').classList.toggle('active', screen === 'folders');
        document.getElementById('navAdd').classList.toggle('active', screen === 'addEdit');
        
        if(screen === 'folders') {
            renderMainFolders();
            currentSubFolder = null; // Reset saat di home
        }
    }

    function goBack() {
        // Jika sedang di layar produk, kembali ke layar folder utama
        if (!document.getElementById('screenProducts').classList.contains('hidden') || 
            !document.getElementById('screenAddEdit').classList.contains('hidden')) {
            showScreen('folders');
        } else {
            showScreen('folders');
        }
    }

    function backToProducts() {
        if (currentSubFolder) {
            openSubFolder(currentSubFolder.mainIdx, currentSubFolder.subIdx);
        } else {
            showScreen('folders');
        }
    }

    // ==================== CORE LOGIC ====================
    async function loadAll() {
        const data = localStorage.getItem('StokStripData');
        if(data) {
            mainFolders = JSON.parse(data);
        } else {
            mainFolders = [{ name: "CONTOH", subFolders: [{name: "SUB CONTOH", products: []}] }];
        }
    }

    async function saveAll() {
        localStorage.setItem('StokStripData', JSON.stringify(mainFolders));
    }

    function renderMainFolders() {
        const container = document.getElementById('mainFoldersContainer');
        const kw = document.getElementById('searchFolder').value.toLowerCase();
        
        container.innerHTML = mainFolders.map((mf, mIdx) => {
            const filteredSubs = mf.subFolders.filter(sf => sf.name.toLowerCase().includes(kw));
            if(kw && filteredSubs.length === 0 && !mf.name.toLowerCase().includes(kw)) return '';

            return `
                <div class="main-folder">
                    <div class="main-folder-header" onclick="toggleSubFolders(${mIdx})">
                        <div class="main-folder-title">📁 ${mf.name}</div>
                        <button class="main-folder-action-btn" onclick="event.stopPropagation(); deleteMainFolder(${mIdx})">🗑️</button>
                    </div>
                    <div class="sub-folders show" id="sub_${mIdx}">
                        ${mf.subFolders.map((sf, sIdx) => `
                            <div class="sub-folder-card" onclick="openSubFolder(${mIdx}, ${sIdx})">
                                <div class="sub-folder-info">
                                    <div class="sub-folder-name">📂 ${sf.name}</div>
                                    <div class="sub-folder-badge">${sf.products?.length || 0} items</div>
                                </div>
                                <button class="sub-folder-btn" onclick="event.stopPropagation(); deleteSubFolder(${mIdx}, ${sIdx})">🗑️</button>
                            </div>
                        `).join('')}
                        <div class="add-sub-folder" onclick="showAddSubFolderModal(${mIdx})">+ Sub Folder</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function openSubFolder(mIdx, sIdx) {
        currentSubFolder = { mainIdx: mIdx, subIdx: sIdx };
        const sf = mainFolders[mIdx].subFolders[sIdx];
        document.getElementById('currentSubFolderName').innerText = sf.name;
        renderProductList();
        showScreen('products');
    }

    function renderProductList() {
        if(!currentSubFolder) return;
        const sub = mainFolders[currentSubFolder.mainIdx].subFolders[currentSubFolder.subIdx];
        const container = document.getElementById('listContainer');
        
        container.innerHTML = sub.products.map(p => `
            <div class="product-item">
                <img class="product-img" src="${p.foto || 'https://via.placeholder.com/65'}">
                <div class="product-info">
                    <div class="${p.stok == 0 ? 'product-name-stok0' : 'product-name-stok4plus'}">${p.nama}</div>
                    <div style="font-size:0.8rem">Stok: <b>${p.stok}</b></div>
                </div>
                <div style="display:flex; gap:5px;">
                    <button class="stock-btn" onclick="ubahStok(${p.id}, 1)">+</button>
                    <button class="stock-btn" onclick="ubahStok(${p.id}, -1)">-</button>
                </div>
            </div>
        `).join('');
    }

    async function ubahStok(id, delta) {
        const sub = mainFolders[currentSubFolder.mainIdx].subFolders[currentSubFolder.subIdx];
        const p = sub.products.find(x => x.id === id);
        if(p) {
            p.stok = Math.max(0, p.stok + delta);
            await saveAll();
            renderProductList();
        }
    }

    function showAddProduct() {
        document.getElementById('editId').value = '';
        document.getElementById('nama').value = '';
        document.getElementById('fotoUrl').value = '';
        document.getElementById('initialStock').value = '0';
        
        const select = document.getElementById('subFolderSelect');
        select.innerHTML = mainFolders.flatMap((mf, mIdx) => 
            mf.subFolders.map((sf, sIdx) => `<option value="${mIdx}|${sIdx}">${mf.name} > ${sf.name}</option>`)
        ).join('');
        
        if(currentSubFolder) {
            select.value = `${currentSubFolder.mainIdx}|${currentSubFolder.subIdx}`;
        }
        
        showScreen('addEdit');
    }

    async function simpanProduk() {
        const nama = document.getElementById('nama').value;
        const [mIdx, sIdx] = document.getElementById('subFolderSelect').value.split('|').map(Number);
        const stok = parseInt(document.getElementById('initialStock').value) || 0;
        const foto = document.getElementById('fotoUrl').value;

        if(!nama) return alert("Nama produk kosong");

        mainFolders[mIdx].subFolders[sIdx].products.push({
            id: Date.now(),
            nama, stok, foto
        });

        await saveAll();
        showToast("Tersimpan!");
        openSubFolder(mIdx, sIdx);
    }

    // ==================== FOLDER OPS ====================
    let tempMainIdx = null;
    function showAddMainFolderModal() { tempMainIdx = null; document.getElementById('folderModal').style.display='flex'; }
    function showAddSubFolderModal(mIdx) { tempMainIdx = mIdx; document.getElementById('folderModal').style.display='flex'; }
    function closeFolderModal() { document.getElementById('folderModal').style.display='none'; }

    async function saveFolderModal() {
        const name = document.getElementById('folderNameInput').value.toUpperCase();
        if(!name) return;
        if(tempMainIdx === null) {
            mainFolders.push({ name, subFolders: [] });
        } else {
            mainFolders[tempMainIdx].subFolders.push({ name, products: [] });
        }
        await saveAll();
        renderMainFolders();
        closeFolderModal();
    }

    async function deleteMainFolder(idx) { if(confirm("Hapus Main Folder?")) { mainFolders.splice(idx,1); await saveAll(); renderMainFolders(); } }
    async function deleteSubFolder(mIdx, sIdx) { if(confirm("Hapus Sub Folder?")) { mainFolders[mIdx].subFolders.splice(sIdx,1); await saveAll(); renderMainFolders(); } }

    function toggleMenu() { document.getElementById('menuDropdown').classList.toggle('show'); }
    function showToast(m) {
        const t = document.createElement('div'); t.className='toast'; t.innerText=m;
        document.body.appendChild(t); setTimeout(()=>t.remove(), 2000);
    }

    function zoomIn() { currentZoom = Math.min(currentZoom + 0.1, 1.5); applyZoom(); }
    function resetZoom() { currentZoom = 1; applyZoom(); }
    function applyZoom() { document.getElementById('zoomContainer').style.transform = `scale(${currentZoom})`; }

    // Init
    window.onload = async () => {
        await loadAll();
        showScreen('folders');
    };
</script>

</body>
</html>
